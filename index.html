<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f2f2f7">
<meta name="apple-mobile-web-app-title" content="NoteView">
<title>NoteView</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:#f2f2f7}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;color:#1c1c1e;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
:root{
  --sat:env(safe-area-inset-top,44px);--sab:env(safe-area-inset-bottom,0px);
  --nav-h:44px;--tab-h:49px;
  --orange:#ff9500;--blue:#007aff;--red:#ff3b30;--green:#34c759;
  --gray:#8e8e93;--gray4:#d1d1d6;--gray5:#e5e5ea;
  --bg:#fff;--bg2:#f2f2f7;--label:#1c1c1e;--label2:#636366;--label3:#8e8e93;
  --fill2:rgba(120,120,128,.16);--fill3:rgba(120,120,128,.12);--sep:rgba(60,60,67,.29);
  --top:calc(var(--sat) + var(--nav-h));--bot:calc(var(--sab) + var(--tab-h));
}
@media(prefers-color-scheme:dark){
  html,body{background:#000}
  :root{--bg:#1c1c1e;--bg2:#000;--label:#fff;--label2:rgba(235,235,245,.6);--label3:rgba(235,235,245,.3);--fill2:rgba(120,120,128,.36);--fill3:rgba(120,120,128,.24);--sep:rgba(84,84,88,.6);--gray4:#3a3a3c;--gray5:#2c2c2e}
}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--top);padding-top:var(--sat);display:flex;align-items:flex-end;background:rgba(242,242,247,.92);border-bottom:1px solid var(--sep);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
@media(prefers-color-scheme:dark){.nav{background:rgba(0,0,0,.88)}}
.nav-inner{width:100%;height:var(--nav-h);display:flex;align-items:center;padding:0 8px;position:relative}
.nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:17px;font-weight:600;color:var(--label);white-space:nowrap;max-width:55%;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.nav-l,.nav-r{display:flex;align-items:center}
.nav-r{margin-left:auto}
.nav-btn{font-family:inherit;font-size:17px;font-weight:400;color:var(--blue);background:none;border:none;padding:8px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.nav-btn:active{opacity:.4}
.nav-btn.w{font-weight:600}

/* TAB */
.tab{position:fixed;bottom:0;left:0;right:0;z-index:300;height:var(--bot);padding-bottom:var(--sab);display:flex;align-items:flex-start;background:rgba(242,242,247,.92);border-top:1px solid var(--sep);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
@media(prefers-color-scheme:dark){.tab{background:rgba(0,0,0,.88)}}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 2px;background:none;border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.tab-item:active{opacity:.5}
.tab-ico{font-size:22px;line-height:1.2}
.tab-lbl{font-size:10px;font-weight:500;color:var(--gray)}
.tab-item.on .tab-lbl{color:var(--orange)}

/* SCREENS */
#scLib{position:fixed;top:var(--top);left:0;right:0;bottom:var(--bot);background:var(--bg2);overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
#scLib::-webkit-scrollbar{display:none}
#scViewer{position:fixed;top:var(--top);left:0;right:0;bottom:var(--bot);background:var(--bg2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#scViewer.show{transform:translateX(0)}
#scCreate{position:fixed;bottom:0;left:0;right:0;z-index:400;display:flex;flex-direction:column;justify-content:flex-end;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);pointer-events:none}
#scCreate.show{transform:translateY(0);pointer-events:all}
.create-mask{position:fixed;inset:0;z-index:-1;background:rgba(0,0,0,.45);opacity:0;transition:opacity .32s;pointer-events:none}
#scCreate.show .create-mask{opacity:1;pointer-events:all}

/* LIBRARY */
.lib-hd{font-size:13px;font-weight:600;color:var(--label2);letter-spacing:.06em;text-transform:uppercase;padding:20px 16px 8px}
.deck-list{padding:0 16px 20px}
.deck-card{display:flex;align-items:center;gap:12px;background:var(--bg);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:background .1s}
.deck-card:active{background:var(--gray5)}
.deck-thumb{width:50px;height:66px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--gray5);box-shadow:0 1px 4px rgba(0,0,0,.14)}
.deck-thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
.deck-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px}
.deck-info{flex:1;min-width:0}
.deck-name{font-size:15px;font-weight:600;color:var(--label);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-meta{font-size:12px;color:var(--label3);margin-top:3px}
.deck-tag{display:inline-block;margin-top:5px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.deck-chev{color:var(--gray4);font-size:17px;flex-shrink:0}
.deck-del{display:none;padding:6px 12px;border-radius:8px;background:rgba(255,59,48,.12);border:1px solid rgba(255,59,48,.3);color:var(--red);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.lib-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 24px;text-align:center;min-height:40vh}
.lib-empty-ico{font-size:48px}
.lib-empty-t{font-size:20px;font-weight:700;color:var(--label)}
.lib-empty-b{font-size:15px;color:var(--label2);line-height:1.5}
.lib-empty-btn{padding:12px 28px;background:var(--blue);color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600}
.lib-empty-btn:active{opacity:.7}

/* VIEWER */
.stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:12px 10px 8px;min-height:0}
.book{position:relative;flex-shrink:0;box-shadow:0 6px 24px rgba(0,0,0,.22),0 1px 4px rgba(0,0,0,.1);border-radius:2px 10px 10px 2px}
.book::before,.book::after{content:'';position:absolute;top:0;border-radius:2px 10px 10px 2px;pointer-events:none;width:100%;height:100%}
.book::before{transform:translate(5px,4px);background:#d8d3c8;z-index:-2}
.book::after{transform:translate(2px,2px);background:#e8e3d8;z-index:-1}
.pcard{position:absolute;inset:0;border-radius:2px 10px 10px 2px;background:#f8f3e8;transform-origin:left center;backface-visibility:hidden;-webkit-backface-visibility:hidden;pointer-events:none}
.pcard img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:top center;display:block;background:#f8f3e8;border-radius:2px 10px 10px 2px;-webkit-user-drag:none;pointer-events:none}
.pcard::after{content:'';position:absolute;left:0;top:0;bottom:0;width:10px;background:linear-gradient(to right,rgba(0,0,0,.08),transparent);z-index:1;pointer-events:none}

/* CTRL */
.ctrl{flex-shrink:0;background:var(--bg);border-top:1px solid var(--sep);padding:10px 14px 12px;display:flex;flex-direction:column;gap:8px}
.pg-pill-row{display:flex;justify-content:center}
.pg-pill{background:var(--fill2);border-radius:100px;padding:5px 20px;font-size:15px;font-weight:700;color:var(--label);min-width:80px;text-align:center}
.ctrl-row{display:flex;align-items:center;gap:8px}
.ctrl-btn{width:48px;height:48px;border-radius:12px;background:var(--fill3);border:none;color:var(--label);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:background .1s}
.ctrl-btn:active{background:var(--fill2);transform:scale(.9)}
.ctrl-btn:disabled{opacity:.28;pointer-events:none}
.ctrl-btn.grid-on{background:rgba(255,149,0,.18);color:var(--orange)}
.sl-wrap{flex:1;height:48px;display:flex;align-items:center;padding:0 2px}
.sl-track{width:100%;height:4px;border-radius:2px;background:var(--gray4);position:relative;cursor:pointer}
.sl-fill{height:100%;border-radius:2px;background:var(--orange);pointer-events:none}
.sl-knob{position:absolute;top:50%;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 0 0 .5px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.2);transform:translate(-50%,-50%);pointer-events:none}
.ctrl-hint{display:flex;justify-content:space-between;padding:0 2px}
.ctrl-hint span{font-size:10px;color:var(--label3)}

/* GRID PANEL */
.grid-panel{position:absolute;left:0;right:0;bottom:0;z-index:50;overflow:hidden;max-height:0;transition:max-height .22s cubic-bezier(.4,0,.2,1);background:var(--bg);border-top:1px solid var(--sep)}
.grid-panel.open{max-height:46vh}
.gp-head{display:flex;align-items:center;padding:10px 14px 6px;border-bottom:1px solid var(--sep)}
.gp-title{flex:1;font-size:13px;font-weight:600;color:var(--label2);letter-spacing:.06em;text-transform:uppercase}
.gp-close{width:26px;height:26px;border-radius:50%;background:var(--fill3);border:none;font-size:12px;color:var(--label2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.gp-close:active{background:var(--fill2)}
.gp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:7px;padding:8px 12px 12px;overflow-y:auto;max-height:calc(46vh - 42px);-webkit-overflow-scrolling:touch}
.gp-grid::-webkit-scrollbar{display:none}
.gp-th{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border-radius:8px;padding:4px;border:2px solid transparent;-webkit-tap-highlight-color:transparent}
.gp-th:active{background:var(--fill3)}
.gp-th.cur{border-color:var(--orange);background:rgba(255,149,0,.09)}
.gp-th img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;border-radius:5px;background:#f8f3e8;box-shadow:0 1px 3px rgba(0,0,0,.1);display:block}
.gp-n{font-size:10px;color:var(--label3)}
.gp-th.cur .gp-n{color:var(--orange);font-weight:700}

/* EMPTY */
.v-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:32px}
.v-empty-ico{font-size:48px}
.v-empty-t{font-size:20px;font-weight:700;color:var(--label)}
.v-empty-b{font-size:15px;color:var(--label2);line-height:1.5}

/* CREATE SHEET */
.sheet{background:var(--bg2);border-radius:14px 14px 0 0;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -2px 20px rgba(0,0,0,.16)}
.sheet-grip-row{display:flex;justify-content:center;padding:10px 0 4px;flex-shrink:0}
.sheet-grip{width:36px;height:4px;border-radius:2px;background:var(--gray4)}
.sheet-title{text-align:center;font-size:17px;font-weight:700;color:var(--label);padding:4px 16px 12px;flex-shrink:0;border-bottom:1px solid var(--sep)}
.sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.sheet-body::-webkit-scrollbar{display:none}
.ios-label{font-size:13px;color:var(--label2);padding:16px 20px 6px}
.ios-group{background:var(--bg);border-radius:12px;margin:0 16px;overflow:hidden}
.ios-row{display:flex;align-items:center;min-height:44px;border-bottom:1px solid var(--sep);padding:0 14px}
.ios-row:last-child{border-bottom:none}
.ios-row-l{font-size:17px;color:var(--label);min-width:68px;flex-shrink:0}
.ios-inp{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:17px;color:var(--label);padding:10px 0;touch-action:auto;-webkit-user-select:text;user-select:text}
.ios-inp::placeholder{color:var(--label3)}
.color-row{display:flex;gap:10px;flex-wrap:wrap;padding:12px 14px}
.csw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s;-webkit-tap-highlight-color:transparent}
.csw:active{transform:scale(.85)}
.csw.on{border-color:rgba(255,255,255,.9);outline:2px solid rgba(0,0,0,.2);outline-offset:1px;transform:scale(1.14)}
.dropzone{margin:0 16px;border-radius:12px;border:2px dashed var(--gray4);background:var(--bg);padding:24px 16px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .15s,background .15s;touch-action:auto}
.dropzone:active,.dropzone.drag{border-color:var(--orange);background:rgba(255,149,0,.05)}
.dropzone.has{border-color:var(--green);background:rgba(52,199,89,.05)}
.dz-ico{font-size:28px}.dz-txt{font-size:15px;color:var(--label2)}
.dz-cnt{font-size:15px;font-weight:700;color:var(--green);display:none}
.dropzone.has .dz-cnt{display:block}.dropzone.has .dz-txt{display:none}
.sheet-foot{flex-shrink:0;display:flex;gap:10px;padding:12px 16px calc(var(--sab) + 12px);border-top:1px solid var(--sep);background:var(--bg2)}
.sh-btn{flex:1;padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:17px;font-weight:600;-webkit-tap-highlight-color:transparent;transition:opacity .1s}
.sh-btn:active{opacity:.6}
.sh-btn.cancel{background:var(--fill2);color:var(--label)}
.sh-btn.go{background:var(--orange);color:#fff}
.sh-btn:disabled{opacity:.3;pointer-events:none}

/* LOADING */
.loading{position:absolute;inset:0;z-index:99;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--gray4);border-top-color:var(--orange);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:var(--label2)}
.progress-bar{width:200px;height:4px;border-radius:2px;background:var(--gray4);overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--orange);transition:width .15s}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--bot) + 12px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:500}
.toast.show{opacity:1}
</style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-inner">
    <div class="nav-l" id="navL"></div>
    <div class="nav-title" id="navTitle">ライブラリ</div>
    <div class="nav-r" id="navR"><button class="nav-btn w" onclick="openCreate()">＋ 追加</button></div>
  </div>
</nav>

<div id="scLib"><div id="libContent"></div></div>

<div id="scViewer">
  <div class="v-empty" id="vEmpty">
    <div class="v-empty-ico">📄</div>
    <div class="v-empty-t">ノート未選択</div>
    <div class="v-empty-b">ライブラリからノートを選んでください</div>
  </div>
  <div class="stage" id="stage" style="display:none">
    <div class="grid-panel" id="gridPanel">
      <div class="gp-head">
        <div class="gp-title" id="gpTitle">ページ一覧</div>
        <button class="gp-close" id="gpClose">✕</button>
      </div>
      <div class="gp-grid" id="gpGrid"></div>
    </div>
    <div class="book" id="book"></div>
  </div>
  <div class="ctrl" id="ctrl" style="display:none">
    <div class="pg-pill-row"><div class="pg-pill" id="pgPill">— / —</div></div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="btnPrev" disabled>‹</button>
      <div class="sl-wrap"><div class="sl-track" id="slTrack">
        <div class="sl-fill" id="slFill" style="width:0%"></div>
        <div class="sl-knob" id="slKnob" style="left:0%"></div>
      </div></div>
      <button class="ctrl-btn" id="btnGrid">⊞</button>
      <button class="ctrl-btn" id="btnNext" disabled>›</button>
    </div>
    <div class="ctrl-hint"><span>前のページ</span><span>ページ一覧</span><span>次のページ</span></div>
  </div>
</div>

<div id="scCreate">
  <div class="create-mask" id="createMask"></div>
  <div class="sheet">
    <div class="sheet-grip-row"><div class="sheet-grip"></div></div>
    <div class="sheet-title">新しいノートを追加</div>
    <div class="sheet-body" id="sheetBody">
      <div class="ios-label">基本情報</div>
      <div class="ios-group">
        <div class="ios-row"><div class="ios-row-l">名前</div><input class="ios-inp" id="cName" type="text" placeholder="例：数学 解答" maxlength="50" autocomplete="off" autocorrect="off"></div>
        <div class="ios-row"><div class="ios-row-l">科目</div><input class="ios-inp" id="cSubj" type="text" placeholder="例：数学Ⅱ" maxlength="30" autocomplete="off" autocorrect="off"></div>
      </div>
      <div class="ios-label">カラー</div>
      <div class="ios-group"><div class="color-row" id="colorRow"></div></div>
      <div class="ios-label">画像（複数選択可 · 選択順がページ順）</div>
      <div class="dropzone" id="dropzone">
        <div class="dz-ico">🖼️</div>
        <div class="dz-txt">タップして画像を選択</div>
        <div class="dz-cnt" id="dzCnt"></div>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
      <div style="height:16px"></div>
    </div>
    <div class="sheet-foot">
      <button class="sh-btn cancel" id="btnCancel">キャンセル</button>
      <button class="sh-btn go" id="btnCreate" disabled>作成する</button>
    </div>
  </div>
</div>

<nav class="tab">
  <button class="tab-item on" id="tabLib" onclick="showLib()"><div class="tab-ico">📚</div><div class="tab-lbl">ライブラリ</div></button>
  <button class="tab-item" id="tabView" onclick="showViewer()"><div class="tab-ico">📖</div><div class="tab-lbl">ビューワー</div></button>
  <button class="tab-item" id="tabAdd" onclick="openCreate()"><div class="tab-ico">➕</div><div class="tab-lbl">新規作成</div></button>
</nav>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ─────────────────────────────────────────
   IndexedDB
───────────────────────────────────────── */
const DB_NAME='nv4',DB_VER=1,STORE='imgs',META_KEY='nv4_meta';
let _db=null;

async function openDB(){
  if(_db)return;
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE);
    r.onsuccess=e=>{_db=e.target.result;res()};
    r.onerror=()=>rej(r.error);
  });
}
const idbSet=(k,v)=>new Promise((res,rej)=>{const tx=_db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(v,k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)});
const idbGet=(k)=>new Promise((res,rej)=>{const tx=_db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).get(k);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error)});
const idbDel=(k)=>new Promise((res,rej)=>{const tx=_db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)});
const idbKeys=()=>new Promise((res,rej)=>{const tx=_db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAllKeys();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});

/* ─────────────────────────────────────────
   BlobURL キャッシュ (LRU, 上限10件)
   deck切替時は必ず clearBlobCache() を呼ぶ。
───────────────────────────────────────── */
const MAX_BLOB=10;
const _blobMap=new Map(); // key → url
const _blobOrder=[];      // LRU 順 (先頭=最古)

function _evictBlob(){
  while(_blobOrder.length>=MAX_BLOB){
    const old=_blobOrder.shift();
    const url=_blobMap.get(old);
    if(url)URL.revokeObjectURL(url);
    _blobMap.delete(old);
  }
}

function clearBlobCache(){
  for(const url of _blobMap.values())URL.revokeObjectURL(url);
  _blobMap.clear();_blobOrder.length=0;
}

async function getBlobUrl(key){
  if(!key)return null;
  // キャッシュヒット → LRU 末尾へ
  if(_blobMap.has(key)){
    const i=_blobOrder.indexOf(key);
    if(i>-1){_blobOrder.splice(i,1);_blobOrder.push(key);}
    return _blobMap.get(key);
  }
  const blob=await idbGet(key);
  if(!blob)return null;
  _evictBlob();
  const url=URL.createObjectURL(blob);
  _blobMap.set(key,url);
  _blobOrder.push(key);
  return url;
}

/* ─────────────────────────────────────────
   画像圧縮 (最大辺1600px / WebP 0.82)
───────────────────────────────────────── */
function compressImage(file){
  return new Promise(res=>{
    const tmpUrl=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(tmpUrl);
      let w=img.naturalWidth,h=img.naturalHeight;
      const MAX=1600;
      if(w>MAX||h>MAX){w>h?(h=Math.round(h*MAX/w),w=MAX):(w=Math.round(w*MAX/h),h=MAX)}
      const cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      if(cv.toBlob){cv.toBlob(b=>res(b||file),'image/webp',0.82)}
      else res(file);
    };
    img.onerror=()=>{URL.revokeObjectURL(tmpUrl);res(file)};
    img.src=tmpUrl;
  });
}

function loadMeta(){try{return JSON.parse(localStorage.getItem(META_KEY))||[]}catch{return[]}}

/* ─────────────────────────────────────────
   DB整合性チェック
   ★ validateDecks は起動時に一度だけ実行。
     孤立IDBキーの削除と、localStorage に
     あるが IDB に実体がない deck の除去を行う。
     「壊れたデータを除去」のtoastは出さない
     (GitHub Pages で毎回出て混乱する原因)
───────────────────────────────────────── */
async function validateDecks(){
  try{
    // IDB に実際に存在するキーセット
    const existingKeys=new Set(await idbKeys());
    let changed=false;
    const valid=decks.filter(d=>{
      if(!d.id||!Array.isArray(d.pages)||!d.pages.length)return false;
      // 全ページのキーが存在するか確認
      const allExist=d.pages.every(k=>existingKeys.has(k));
      if(!allExist){console.warn('[NoteView] deck removed:',d.id);changed=true;return false;}
      return true;
    });
    if(changed){decks=valid;saveMeta(decks);}
  }catch(e){
    console.warn('[NoteView] validateDecks failed:',e);
    // DB エラー時はスキップ（deck を消さない）
  }
}

async function delDeck(id){
  const d=decks.find(x=>x.id===id);if(!d)return;
  for(const k of(d.pages||[])){

    _blobMap.delete(k);
    const i=_blobOrder.indexOf(k);if(i>-1)_blobOrder.splice(i,1);
    await idbDel(k);
  }
  decks=decks.filter(x=>x.id!==id);saveMeta(decks);
  if(curId===id){curId=null;clearViewer();}

  const R=3/4;let w,h;

  w=Math.floor(w);h=Math.floor(h);

/* ── openDeck ──
   ★ 修正ポイント:
   1. deck切替時に必ず clearBlobCache() → 前のdeck画像が出るバグを防ぐ
   2. pageKeys/pgCnt/curPg を DOM 操作より先にセット → pgCnt=0のまま updCtrl が走るバグを防ぐ
   3. 起動時の自動復元を廃止 → ユーザーが明示的にタップしたときだけ開く
*/
async function openDeck(id){
  const d=decks.find(x=>x.id===id);
  if(!d){toast('ノートが見つかりません');return}

  // ★ deck が変わるときは必ず BlobURL キャッシュを全クリア
  if(curId!==id) clearBlobCache();

  curId=id;

  // ★ State を先に確定させる
  clearDomPages();
  pageKeys=[...(d.pages||[])]; // コピーして参照を切る
  pgCnt=pageKeys.length;
  curPg=0;

  // 画面を先に切り替えてレイアウトを確定させる
  showViewer();

  // ローディング表示
  const ld=document.createElement('div');ld.className='loading';
  ld.innerHTML='<div class="spinner"></div><div class="loading-txt">読み込み中…</div><div class="progress-bar"><div class="progress-fill" id="pgBarFill" style="width:0%"></div></div>';
  document.getElementById('vEmpty').style.display='none';
  stageEl.style.display='flex';
  document.getElementById('ctrl').style.display='flex';
  stageEl.appendChild(ld);

  // 先頭±PRELOAD 枚をロード
  await loadWindow(0,ld.querySelector('#pgBarFill'));
  ld.remove();

  // ★ pgCnt が確定した後で sizeBook → applyStates → updCtrl
  requestAnimationFrame(()=>{
    sizeBook();
    applyStates();
    updCtrl();
    buildGrid();
  });
  renderLib();
}

  pageKeys=[];pgCnt=0;curPg=0;
}

/* ─────────────────────────────────────────
   仮想DOM管理 (現在±PRELOAD枚のみ保持)
───────────────────────────────────────── */
function winRange(center){
  return{lo:Math.max(0,center-PRELOAD),hi:Math.min(pgCnt-1,center+PRELOAD)};
}

function evictOutside(lo,hi){
  for(const [idx,entry] of _domPages){
    if(idx<lo||idx>hi){entry.el.remove();_domPages.delete(idx);}
  }
}

async function ensureCard(idx){
  if(idx<0||idx>=pgCnt||_domPages.has(idx))return;
  const div=document.createElement('div');
  div.className='pcard';
  const behind=idx<curPg;
  div.style.transform=behind?'rotateY(-180deg)':'rotateY(0deg)';
  div.style.zIndex=behind?(idx+2):(pgCnt+5-idx);
  const img=document.createElement('img');
  img.alt='p'+(idx+1);
  div.appendChild(img);
  bookEl.appendChild(div);
  _domPages.set(idx,{el:div,img});
  // 非同期で画像をセット
  const url=await getBlobUrl(pageKeys[idx]);
  if(url&&_domPages.has(idx)) img.src=url;
}

async function loadWindow(center,barEl){
  const{lo,hi}=winRange(center);
  evictOutside(lo,hi);
  let done=0;
  const total=hi-lo+1;
  for(let i=lo;i<=hi;i++){
    await ensureCard(i);
    done++;
    if(barEl)barEl.style.width=Math.round(done/total*100)+'%';
  }
}

function clearDomPages(){
  for(const e of _domPages.values())e.el.remove();
  _domPages.clear();
}

function applyStates(){
  for(const [idx,{el}] of _domPages){
    const b=idx<curPg;
    el.style.transition='none';
    el.style.transform=b?'rotateY(-180deg)':'rotateY(0deg)';
    el.style.zIndex=b?(idx+2):(pgCnt+5-idx);
  }
}

/* ─────────────────────────────────────────
   フリップアニメーション
───────────────────────────────────────── */
const FMS=190;
function flipOut(idx,cb){
  const e=_domPages.get(idx);if(!e){cb();return}
  e.el.style.zIndex=pgCnt+20;
  e.el.style.willChange='transform';
  e.el.style.transition=`transform ms cubic-bezier(.4,0,.6,1)`;
  e.el.style.transform='rotateY(-180deg)';
  setTimeout(()=>{e.el.style.transition='none';e.el.style.willChange='';cb()},FMS+12);
}
function flipIn(idx,cb){
  const e=_domPages.get(idx);if(!e){cb();return}
  e.el.style.zIndex=pgCnt+20;
  e.el.style.transform='rotateY(-180deg)';
  e.el.style.willChange='transform';
  e.el.style.transition='none';
  requestAnimationFrame(()=>{
    e.el.style.transition=`transform ms cubic-bezier(.4,0,.6,1)`;
    e.el.style.transform='rotateY(0deg)';
    setTimeout(()=>{e.el.style.transition='none';e.el.style.willChange='';cb()},FMS+12);
  });
}

function goTo(target,instant){
  target=Math.max(0,Math.min(pgCnt-1,target));
  if(target===curPg)return;
  if(busy&&!instant)return;
  if(instant){
    curPg=target;
    loadWindow(curPg).then(()=>{applyStates();updCtrl();syncGridCur();});
    return;
  }
  busy=true;
  const dir=target>curPg?1:-1;
  chain(curPg,target,dir,()=>{busy=false;updCtrl();});
}

function chain(from,to,dir,done){
  if(from===to){
    loadWindow(curPg).then(()=>{applyStates();syncGridCur();});
    done();return;
  }
  if(dir>0){
    if(!_domPages.has(from)){curPg=from+1;chain(from+1,to,dir,done);return}
    flipOut(from,()=>{
      curPg=from+1;
      ensureCard(Math.min(pgCnt-1,curPg+PRELOAD)).catch(()=>{});
      evictOutside(winRange(curPg).lo,winRange(curPg).hi);
      applyStates();updCtrl();chain(from+1,to,dir,done);
    });
  }else{
    if(!_domPages.has(from-1)){curPg=from-1;chain(from-1,to,dir,done);return}
    flipIn(from-1,()=>{
      curPg=from-1;
      ensureCard(Math.max(0,curPg-PRELOAD)).catch(()=>{});
      evictOutside(winRange(curPg).lo,winRange(curPg).hi);
      applyStates();updCtrl();chain(from-1,to,dir,done);
    });
  }
}

let tsx=0,tsy=0,ta=false;
bookEl.style.touchAction='none';
bookEl.addEventListener('touchstart',e=>{

  tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;ta=true;
},{passive:true});

  const dx=e.touches[0].clientX-tsx,dy=e.touches[0].clientY-tsy;

},{passive:false});

},{passive:true});

// スライダー
(()=>{
  const tr=document.getElementById('slTrack');let pd=false;
  function hit(cx){
    const r=tr.getBoundingClientRect();
    goTo(Math.round(Math.max(0,Math.min(1,(cx-r.left)/r.width))*(pgCnt-1)),true);
  }
  tr.addEventListener('click',e=>hit(e.clientX));
  tr.addEventListener('touchstart',e=>{pd=true;hit(e.touches[0].clientX)},{passive:true});
  tr.addEventListener('touchmove',e=>{if(!pd)return;hit(e.touches[0].clientX);e.preventDefault()},{passive:false});
  tr.addEventListener('touchend',()=>{pd=false},{passive:true});
})();

document.addEventListener('keydown',e=>{
  if(e.target.matches('input'))return;
  if(['ArrowRight','ArrowDown'].includes(e.key)){e.preventDefault();goTo(curPg+1)}
  if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();goTo(curPg-1)}
  if(e.key==='g')toggleGrid();
  if(e.key==='Escape')closeGrid();
});

/* ─────────────────────────────────────────
   ページグリッド
   ★ root:null (viewport基準) にして
     grid が閉じていても observe できるようにする。
     openGrid() 時に未ロード分を全件ロード。
───────────────────────────────────────── */
let _io=null;

function buildGrid(){
  const g=document.getElementById('gpGrid');g.innerHTML='';
  if(_io){_io.disconnect();_io=null}

  _io=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting)return;
      const idx=+entry.target.dataset.idx;
      const img=entry.target.querySelector('img');
      if(img&&!img.getAttribute('src')){
        getBlobUrl(pageKeys[idx]).then(u=>{if(u&&img)img.src=u});
      }
      _io.unobserve(entry.target);
    });
  },{rootMargin:'200px'}); // viewport+200px で早めにロード

  pageKeys.forEach((_,i)=>{
    const t=document.createElement('div');
    t.className='gp-th'+(i===curPg?' cur':'');
    t.dataset.idx=i;
    const img=document.createElement('img');img.alt='P'+(i+1);
    const n=document.createElement('div');n.className='gp-n';n.textContent='P'+(i+1);
    t.appendChild(img);t.appendChild(n);
    t.onclick=()=>{goTo(i,true);closeGrid()};
    g.appendChild(t);
    _io.observe(t);
  });

  // ★ 枚数を必ず表示（pgCnt が確定した後に呼ばれる）
  document.getElementById('gpTitle').textContent='ページ一覧（'+pgCnt+'枚）';
}

function toggleGrid(){gridOpen?closeGrid():openGrid()}
function openGrid(){
  gridOpen=true;
  document.getElementById('gridPanel').classList.add('open');
  document.getElementById('btnGrid').classList.add('grid-on');
  // グリッドが開いた瞬間に未ロードサムネを全件ロード
  requestAnimationFrame(()=>{
    document.querySelectorAll('.gp-th').forEach(el=>{
      const img=el.querySelector('img');
      if(img&&!img.getAttribute('src')){
        getBlobUrl(pageKeys[+el.dataset.idx]).then(u=>{if(u&&img)img.src=u});
      }
    });
    const cur=document.querySelector('.gp-th.cur');
    if(cur)cur.scrollIntoView({block:'nearest',behavior:'smooth'});
  });
}
function closeGrid(){
  gridOpen=false;
  document.getElementById('gridPanel').classList.remove('open');
  document.getElementById('btnGrid').classList.remove('grid-on');
}
document.getElementById('btnGrid').onclick=toggleGrid;
document.getElementById('gpClose').onclick=closeGrid;

let _toastT=null;

/* visibilitychange: タブが消えたとき ±1 以外の BlobURL を解放 */
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState!=='hidden')return;
  const keep=new Set();
  for(let i=Math.max(0,curPg-1);i<=Math.min(pgCnt-1,curPg+1);i++)keep.add(pageKeys[i]);
  for(const k of [..._blobMap.keys()])if(!keep.has(k)){
    URL.revokeObjectURL(_blobMap.get(k));_blobMap.delete(k);
    const i=_blobOrder.indexOf(k);if(i>-1)_blobOrder.splice(i,1);
  }
});

/* ─────────────────────────────────────────
   Service Worker (stale-while-revalidate)
───────────────────────────────────────── */
function registerSW(){
  if(!('serviceWorker' in navigator))return;
  const ver='nv4-v1';
  const src=`const C='';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add(location.pathname).catch(()=>{})));self.skipWaiting()});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim()});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  if(e.request.url.startsWith('blob:'))return;
  e.respondWith(caches.open(C).then(async cache=>{
    const cached=await cache.match(e.request);
    const fresh=fetch(e.request).then(r=>{if(r.ok)cache.put(e.request,r.clone());return r}).catch(()=>null);
    return cached||(await fresh)||new Response('offline',{status:503});
  }));
});`;
  try{
    const blob=new Blob([src],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url,{scope:'./'})
      .then(()=>URL.revokeObjectURL(url)).catch(()=>{});
  }catch(e){}
}

/* ─────────────────────────────────────────
   INIT
   ★ 起動時の自動デッキ復元を廃止。
     validateDecks で壊れたdeck除去のみ行い、
     ユーザーが明示的にタップしたときだけ openDeck する。
     (自動復元が「同じ写真が出る」バグの温床だった)
───────────────────────────────────────── */
(async()=>{
  await openDB();
  await validateDecks();
  decks=loadMeta();
  renderLib();
  setNav('lib');
  registerSW();
})();
